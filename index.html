<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Weather App</h1>

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                list="cities"
                placeholder="Enter city name">

            <!-- City Suggestions -->
            <datalist id="cities">

                <option value="Delhi">
                <option value="Mumbai">
                <option value="Kolkata">
                <option value="Chennai">
                <option value="Hyderabad">
                <option value="Bengaluru">
                <option value="Pune">
                <option value="Ahmedabad">
                <option value="Jaipur">
                <option value="Lucknow">
                <option value="Kanpur">
                <option value="Varanasi">
                <option value="Prayagraj">
                <option value="Mathura">
                <option value="Agra">
                <option value="Noida">
                <option value="Ghaziabad">
                <option value="Meerut">
                <option value="Patna">
                <option value="Bhopal">
                <option value="Indore">
                <option value="Ranchi">
                <option value="Raipur">
                <option value="Chandigarh">
                <option value="Amritsar">
                <option value="Jammu">
                <option value="Srinagar">
                <option value="Goa">
                <option value="Kochi">
                <option value="Visakhapatnam">
                <option value="Robertsganj">
                <option value="Obra">
                <option value="Renukoot">
                <option value="Anpara">

            </datalist>

            <button id="searchBtn">
                Search
            </button>

        </div>

        <div class="weather-box">

            <h2 id="cityName">City</h2>

            <img
                id="weatherIcon"
                src=""
                alt="Weather Icon">

            <h3 id="temperature">--°C</h3>

            <p id="description">
                Weather Description
            </p>

            <div class="details">

                <p id="humidity">
                    Humidity : --
                </p>

                <p id="wind">
                    Wind : --
                </p>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
